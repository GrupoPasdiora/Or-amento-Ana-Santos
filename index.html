            {/* Generate button */}
            <div
              style={{ textAlign: "center", marginTop: 28, paddingTop: 20, borderTop: "1px solid #F0E8D0" }}
            >
              <button
                style={{
                  ...btnGold,
                  padding: "14px 40px",
                  fontSize: 13,
                  letterSpacing: 3,
                }}
                onClick={generatePDF}
                disabled={generating}
              >
                {generating ? "Gerando..." : "Gerar PDF e Baixar"}
              </button>
            </div>
          </div>
        )}

        {/* PREVIEW TAB */}
        {activeTab === "preview" && (
          <div>
            <div style={{ textAlign: "center", marginBottom: 20 }}>
              <button
                style={{
                  ...btnGold,
                  padding: "12px 36px",
                  fontSize: 13,
                  letterSpacing: 3,
                }}
                onClick={generatePDF}
                disabled={generating}
              >
                {generating ? "Gerando..." : "Baixar PDF"}
              </button>
            </div>

            <div
              style={{
                background: "#e0ddd6",
                padding: "20px",
                borderRadius: 8,
              }}
            >
              <style dangerouslySetInnerHTML={{ __html: pdfStyles }} />
              <div ref={previewRef}>
                {/* PAGE 1 */}
                <div className="pdf-page">
                  <div className="pdf-frame" />
                  <div className="pdf-frame-inner" />
                  <img className="pdf-logo" src={currentLogo} alt="" />
                  <div className="pdf-brand">
                    <div className="pdf-brand-name">Chef Ana Santos</div>
                    <div className="pdf-brand-sub">Gastronomia</div>
                  </div>
                  <div className="pdf-sep">
                    ◇ ─────── ◆ ─────── ◇
                  </div>
                  <div className="pdf-title">
                    <div className="pdf-title-main">
                      Orçamento Gastronômico
                    </div>
                    <div className="pdf-title-sub">Exclusivo</div>
                  </div>
                  <div className="pdf-sep">•&ensp;&ensp;•&ensp;&ensp;•</div>
                  <div className="pdf-client-box">
                    <div>
                      <div className="pdf-client-label">Cliente</div>
                      <div className="pdf-client-value">
                        {form.clientName || "—"}
                      </div>
                    </div>
                    <div>
                      <div className="pdf-client-label">Convidados</div>
                      <div className="pdf-client-value">
                        {form.guests} pessoas
                      </div>
                    </div>
                  </div>
                  <div className="pdf-greeting">
                    <div className="pdf-greeting-name">
                      Prezada {form.clientName || "Cliente"},
                    </div>
                    <div className="pdf-greeting-text">{greetingText}</div>
                  </div>
                  <div className="pdf-sep-line" />
                  <div className="pdf-menu-title">M E N U</div>
                  {Object.entries(groupedDishes).map(([cat, dishes]) => (
                    <div className="pdf-menu-section" key={cat}>
                      <div className="pdf-menu-section-title">{cat}</div>
                      {dishes.map((d) => (
                        <div className="pdf-dish" key={d.id}>
                          <div className="pdf-dish-name">{d.name}</div>
                          {d.desc && (
                            <div className="pdf-dish-desc">{d.desc}</div>
                          )}
                        </div>
                      ))}
                    </div>
                  ))}
                  {form.sides.length > 0 && (
                    <div className="pdf-menu-section">
                      <div className="pdf-menu-section-title">
                        Acompanhamentos
                      </div>
                      <ul className="pdf-sides-list">
                        {form.sides
                          .filter((s) => s.trim())
                          .map((s, i) => (
                            <li key={i}>{s}</li>
                          ))}
                      </ul>
                    </div>
                  )}
                </div>

                {/* PAGE 2 */}
                <div className="pdf-page2 page-break">
                  <div className="pdf-frame" />
                  <div className="pdf-frame-inner" />
                  <img className="pdf-logo-sm" src={currentLogo} alt="" />
                  <div className="pdf-sep">
                    ◇ ─────── ◆ ─────── ◇
                  </div>
                  <div className="pdf-invest-title">Investimento</div>
                  <div className="pdf-invest-box">
                    <div className="pdf-invest-inner">
                      <div className="pdf-invest-label">
                        Valor total para atendimento completo de {form.guests}{" "}
                        pessoas
                      </div>
                      <div className="pdf-invest-value">
                        R$ {formatPrice(form.price)}
                      </div>
                      <div className="pdf-invest-extra">
                        {form.extras
                          .filter((e) => e.trim())
                          .map((e, i) => (
                            <span key={i}>
                              + {e}
                              <br />
                            </span>
                          ))}
                      </div>
                    </div>
                  </div>
                  <div className="pdf-sep">•&ensp;&ensp;•&ensp;&ensp;•</div>
                  <div className="pdf-incluso-title">O que está incluso</div>
                  <ul className="pdf-incluso-list">
                    {form.includes
                      .filter((s) => s.trim())
                      .map((s, i) => (
                        <li key={i}>{s}</li>
                      ))}
                  </ul>
                  <div className="pdf-sep-line" />
                  <div className="pdf-closing">
                    Este orçamento é válido por {form.validity} dias a partir da
                    data de envio.
                    <br />
                    Estou à disposição para eventuais ajustes e personalizações.
                  </div>
                  <div className="pdf-sig-line" />
                  <div className="pdf-sig-name">Chef Ana Santos</div>
                  <div className="pdf-sig-sub">
                    Gastronomia de Excelência
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
